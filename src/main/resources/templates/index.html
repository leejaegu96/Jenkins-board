<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spring Boot Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Jen Board</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/board/list}">게시판</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/mypage}">마이페이지</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">로그인</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/join}">회원가입</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-white">환영합니다, <strong sec:authentication="name"></strong>님</span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-light btn-sm ms-2" type="submit">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container mt-5">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm text-center">
            <div class="container-fluid py-5">
                <h1 class="display-5 fw-bold">Spring Boot 커뮤니티</h1>
                <p class="col-md-8 mx-auto fs-4 text-muted">JPA, Spring Security, Thymeleaf를 활용하여 구성된 간결하고 강력한 게시판
                    애플리케이션입니다.</p>
                <div class="mt-4">
                    <div sec:authorize="isAnonymous()">
                        <a class="btn btn-primary btn-lg px-4 gap-3" th:href="@{/login}">지금 시작하기</a>
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <a class="btn btn-success btn-lg px-4" th:href="@{/board/list}">게시판 둘러보기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
