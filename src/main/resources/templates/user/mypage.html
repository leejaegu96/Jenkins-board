<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>마이페이지 - Jen Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Jen Board</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/board/list}">게시판</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/mypage}">마이페이지</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">로그인</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/join}">회원가입</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-white">환영합니다, <strong sec:authentication="name"></strong>님</span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-light btn-sm ms-2" type="submit">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4 fw-bold">🏠 마이페이지</h2>

        <div class="row">
            <!-- 프로필 카드 영역 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center p-4">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle mb-3"
                            width="100" height="100" alt="Profile">
                        <h4 class="fw-bold" th:text="${user.username}">사용자 이름</h4>
                        <p class="text-muted mb-2">가입일: <span
                                th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}">2026-01-01</span></p>
                        <span class="badge bg-primary px-3 py-2" th:text="${user.role}">일반 회원</span>
                    </div>
                </div>
            </div>

            <!-- 내가 쓴 글 목록 영역 -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 border-light">
                        <h5 class="m-0 fw-bold">📝 내가 작성한 글</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 15%;">ID</th>
                                        <th style="width: 50%;" class="text-start">제목</th>
                                        <th style="width: 15%;">조회수</th>
                                        <th style="width: 20%;">작성일</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="board : ${myBoards}">
                                        <td th:text="${board.id}">1</td>
                                        <td class="text-start">
                                            <a th:href="@{|/board/detail/${board.id}|}"
                                                class="text-decoration-none text-dark fw-semibold"
                                                th:text="${board.title}">게시글 제목</a>
                                        </td>
                                        <td th:text="${board.viewCount}">0</td>
                                        <td class="text-muted small"
                                            th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2026-01-01
                                        </td>
                                    </tr>
                                    <tr th:if="${myBoards.empty}">
                                        <td colspan="4" class="py-5 text-muted">작성한 게시물이 없습니다.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
