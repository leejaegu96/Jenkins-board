<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 - Jen Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 mt-5">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">📝 회원가입</h2>

                        <form th:action="@{/join}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted">아이디</label>
                                <input type="text" class="form-control form-control-lg" id="username" name="username"
                                    required autofocus placeholder="사용할 아이디">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted">비밀번호</label>
                                <input type="password" class="form-control form-control-lg" id="password"
                                    name="password" required placeholder="비밀번호">
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-success btn-lg" type="submit">가입완료</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-muted">이미 계정이 있으신가요?</span>
                            <a th:href="@{/login}" class="text-decoration-none ms-1">로그인</a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-decoration-none text-muted">← 메인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
