<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시물 상세 - Jen Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Jen Board</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/board/list}">게시판</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/mypage}">마이페이지</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">로그인</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/join}">회원가입</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-white">환영합니다, <strong sec:authentication="name"></strong>님</span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-light btn-sm ms-2" type="submit">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white py-3 border-bottom border-light">
                <h3 class="card-title fw-bold m-0" th:text="${board.title}">게시물 제목</h3>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between mb-4 pb-3 border-bottom text-muted small">
                    <div>
                        <span class="me-3"><strong>작성자:</strong> <span th:text="${board.writer}">홍길동</span></span>
                    </div>
                    <div>
                        <span class="me-3"><i class="bi bi-eye"></i> <strong>조회수:</strong> <span
                                th:text="${board.viewCount}">0</span></span>
                        <span><strong>작성일:</strong> <span
                                th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</span></span>
                    </div>
                </div>
                <div class="min-vh-50 p-3 bg-white fs-5" style="white-space: pre-wrap; min-height: 200px;"
                    th:text="${board.content}">
                    게시물 내용이 여기에 표시됩니다.
                </div>

                <div class="text-center mt-5 mb-3">
                    <form th:action="@{|/board/detail/${board.id}/like|}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-lg rounded-pill px-4">
                            <i th:class="${board.isLikedByCurrentUser} ? 'text-danger fw-bold' : ''">❤️</i>
                            좋아요 <span class="badge bg-danger ms-1" th:text="${board.likeCount}">0</span>
                        </button>
                        <div sec:authorize="isAnonymous()" class="mt-2 small text-muted">
                            로그인 후 이용할 수 있습니다.
                        </div>
                    </form>
                </div>
            </div>
            <div class="card-footer bg-light py-3 d-flex justify-content-between border-top border-light">
                <a th:href="@{/board/list}" class="btn btn-outline-secondary">목록으로</a>

                <th:block th:if="${board.writer == currentUser}">
                    <div>
                        <a th:href="@{|/board/edit/${board.id}|}" class="btn btn-warning text-white me-2">수정</a>
                        <form th:action="@{|/board/delete/${board.id}|}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger"
                                onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
                        </form>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <!-- 댓글 영역 -->
    <div class="card shadow-sm border-0 mb-5">
        <div class="card-header bg-white py-3 fw-bold border-bottom">
            💬 댓글 (<span th:text="${comments.size()}">0</span>)
        </div>
        <div class="card-body">
            <!-- 댓글 목록 -->
            <ul class="list-group list-group-flush mb-4">
                <li class="list-group-item px-0 py-3" th:each="comment : ${comments}">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <div>
                            <strong th:text="${comment.writer}">작성자</strong>
                            <small class="text-muted ms-2"
                                th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                        </div>
                        <div th:if="${comment.writer == currentUser}">
                            <form th:action="@{|/board/detail/${board.id}/comment/${comment.id}/delete|}" method="post"
                                class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger shadow-none"
                                    onclick="return confirm('댓글을 삭제하시겠습니까?');">삭제</button>
                            </form>
                        </div>
                    </div>
                    <p class="m-0 mb-1" th:text="${comment.content}">댓글 내용입니다.</p>
                </li>
                <li class="list-group-item px-0 py-4 text-center text-muted" th:if="${comments.empty}">
                    등록된 댓글이 없습니다. 첫 댓글을 남겨보세요!
                </li>
            </ul>

            <!-- 댓글 작성 폼 -->
            <div sec:authorize="isAuthenticated()" class="mt-3">
                <form th:action="@{|/board/detail/${board.id}/comment|}" method="post">
                    <div class="mb-2">
                        <textarea class="form-control" name="content" rows="3" required
                            placeholder="댓글을 입력하세요"></textarea>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary px-4">작성</button>
                    </div>
                </form>
            </div>
            <div sec:authorize="isAnonymous()" class="mt-3 text-center p-4 bg-light rounded text-muted">
                댓글을 작성하려면 <a th:href="@{/login}" class="text-decoration-none fw-bold">로그인</a>이 필요합니다.
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
