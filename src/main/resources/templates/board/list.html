<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시판 목록 - Jen Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Jen Board</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/board/list}">게시판</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/mypage}">마이페이지</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/login}">로그인</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" th:href="@{/join}">회원가입</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="nav-link text-white">환영합니다, <strong sec:authentication="name"></strong>님</span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button class="btn btn-outline-light btn-sm ms-2" type="submit">로그아웃</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold m-0">📄 게시물 목록</h2>
            <div sec:authorize="isAuthenticated()">
                <a th:href="@{/board/write}" class="btn btn-primary">새 글 작성</a>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 10%;">ID</th>
                                <th style="width: 50%;">제목</th>
                                <th class="text-center" style="width: 20%;">작성자</th>
                                <th class="text-center" style="width: 20%;">작성일</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="board : ${boards}">
                                <td class="text-center" th:text="${board.id}">1</td>
                                <td>
                                    <a th:href="@{|/board/detail/${board.id}|}"
                                        class="text-decoration-none text-dark fw-semibold"
                                        th:text="${board.title}">제목</a>
                                </td>
                                <td class="text-center">
                                    <span class="badge bg-secondary" th:text="${board.writer}">홍길동</span>
                                </td>
                                <td class="text-center text-muted small"
                                    th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01</td>
                            </tr>
                            <tr th:if="${boards.empty}">
                                <td colspan="4" class="text-center text-muted py-4">등록된 게시물이 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
